    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background-color: white !important;
                color: black !important;
                padding: 0 !important;
            }
            main {
                margin-left: 0 !important;
                padding: 0 !important;
                width: 100% !important;
            }
            #root {
                display: block !important;
            }
            .bg-slate-900, .bg-slate-800, .bg-slate-950, .bg-slate-800\/50 {
                background-color: transparent !important;
                border: 1px solid #e2e8f0 !important;
                box-shadow: none !important;
            }
            .bg-lime-500 {
                background-color: #ecfdf5 !important;
                border: 2px solid #059669 !important;
                color: #064e3b !important;
                -webkit-print-color-adjust: exact;
            }
            .text-white, .text-slate-300, .text-slate-400, .text-slate-200 {
                color: #1e293b !important;
            }
            .text-lime-500, .text-lime-400 {
                color: #059669 !important;
                font-weight: bold !important;
            }
            .rounded-3xl, .rounded-2xl, .rounded-\[2rem\] {
                border-radius: 12px !important;
            }
            /* Force multi-column layouts to stay visible or adapt */
            .grid {
                display: grid !important;
            }
        }
    </style>
